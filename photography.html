  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #111111;
      --surface:  #1a1a1a;
      --text:     #f5f2ec;
      --sub:      rgba(245,242,236,0.38);
      --border:   rgba(245,242,236,0.08);
      --accent:   #B3B49A;
      --ease:     cubic-bezier(0.16, 1, 0.3, 1);
    }

    html { scroll-behavior: smooth; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', sans-serif;
      -webkit-font-smoothing: antialiased;
      overflow-x: hidden;
    }

    a { color: inherit; text-decoration: none; }
    img { display: block; max-width: 100%; }

    /* ── NAV ── */
    .ph-nav {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 50;
      height: 56px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 2rem;
      background: rgba(17,17,17,0.85);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
    }
    .ph-nav-back {
      display: inline-flex;
      align-items: center;
      gap: 0.45rem;
      font-size: 0.78rem;
      font-weight: 500;
      color: var(--sub);
      letter-spacing: 0.02em;
      transition: color 0.2s var(--ease);
    }
    .ph-nav-back:hover { color: var(--text); }
    .ph-nav-back svg { flex-shrink: 0; }
    .ph-nav-logo {
      font-family: 'Inter', sans-serif;
      font-size: 0.9rem;
      font-weight: 600;
      letter-spacing: 0.08em;
      color: var(--sub);
    }

    /* ── HEADER ── */
    .ph-header {
      padding: 96px 2rem 2.5rem;
      max-width: 1400px;
      margin: 0 auto;
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      gap: 2rem;
    }

    .ph-title-block { line-height: 1; }

    .ph-title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(5rem, 14vw, 13rem);
      font-weight: 400;
      letter-spacing: 0.02em;
      color: var(--text);
      line-height: 0.88;
      /* Subtle grain on the letters */
    }
    .ph-title span {
      display: block;
    }

    .ph-meta {
      text-align: right;
      display: flex;
      flex-direction: column;
      gap: 0.4rem;
      padding-bottom: 0.5rem;
    }
    .ph-meta-label {
      font-size: 0.65rem;
      font-weight: 600;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--accent);
    }
    .ph-meta-count {
      font-size: 0.78rem;
      color: var(--sub);
      letter-spacing: 0.05em;
    }
    .ph-meta-rule {
      width: 40px;
      height: 1px;
      background: var(--border);
      margin-left: auto;
    }

    /* ── PHOTO WALL — CSS columns masonry ── */
    .photo-wall {
      columns: 3;
      column-gap: 20px;
      padding: 20px 20px 80px;
    }

    .pw-item {
      break-inside: avoid;
      margin-bottom: 20px;
      overflow: hidden;
      cursor: pointer;
      position: relative;
      display: block;
    }

    .pw-item img {
      width: 100%;
      height: auto;
      display: block;
      transition: transform 0.6s var(--ease), filter 0.35s ease;
      filter: brightness(0.92);
    }

    .pw-item::after {
      content: '';
      position: absolute;
      inset: 0;
      background: rgba(0,0,0,0);
      transition: background 0.3s ease;
      pointer-events: none;
    }

    .pw-item:hover img {
      transform: scale(1.04);
      filter: brightness(1.0);
    }
    .pw-item:hover::after {
      background: rgba(0,0,0,0.08);
    }

    /* Stagger in with CSS animations */
    .pw-item {
      opacity: 0;
      animation: itemIn 0.5s var(--ease) forwards;
    }
    @keyframes itemIn {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── LIGHTBOX ── */
    .lb {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.97);
      z-index: 200;
      align-items: center;
      justify-content: center;
    }
    .lb.active { display: flex; }

    #lb-img {
      max-width: 92vw;
      max-height: 90vh;
      object-fit: contain;
      border-radius: 2px;
      box-shadow: 0 32px 80px rgba(0,0,0,0.6);
    }

    .lb-btn {
      position: absolute;
      background: none;
      border: none;
      color: rgba(255,255,255,0.5);
      cursor: pointer;
      font-size: 2.6rem;
      line-height: 1;
      transition: color 0.2s ease;
      padding: 0.5rem;
    }
    .lb-btn:hover { color: white; }
    .lb-close { top: 1.25rem; right: 1.5rem; font-size: 2.2rem; }
    .lb-prev  { left: 1.25rem; top: 50%; transform: translateY(-50%); }
    .lb-next  { right: 1.25rem; top: 50%; transform: translateY(-50%); }

    .lb-counter {
      position: absolute;
      bottom: 1.5rem;
      left: 50%;
      transform: translateX(-50%);
      font-size: 0.72rem;
      letter-spacing: 0.12em;
      color: rgba(255,255,255,0.3);
    }

    /* ── FOOTER ── */
    .ph-footer {
      border-top: 1px solid var(--border);
      padding: 1.5rem 2rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .ph-footer-logo {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.4rem;
      letter-spacing: 0.06em;
      color: var(--sub);
    }
    .ph-footer-copy {
      font-size: 0.72rem;
      color: rgba(245,242,236,0.2);
    }

    /* ── RESPONSIVE ── */
    @media (max-width: 960px) {
      .photo-wall { columns: 2; }
      .ph-header { padding-top: 80px; align-items: flex-start; flex-direction: column; }
      .ph-meta { text-align: left; }
      .ph-meta-rule { margin-left: 0; }
    }
    @media (max-width: 520px) {
      .photo-wall { columns: 1; }
      .ph-title { font-size: clamp(4rem, 20vw, 6rem); }
    }

    /* ── REDUCED MOTION ── */
    @media (prefers-reduced-motion: reduce) {
      .pw-item { animation: none; opacity: 1; }
      .pw-item img { transition: none; }
    }

    /* ── ZOOM PARALLAX ── */
    .zp-container {
      position: relative;
      height: 300vh;
    }
    .zp-sticky {
      position: sticky;
      top: 0;
      height: 100vh;
      overflow: hidden;
    }
    .zp-layer {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      will-change: transform;
    }
    .zp-inner {
      position: relative;
      width: 25vw;
      height: 25vh;
      overflow: hidden;
      flex-shrink: 0;
    }
    .zp-inner img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }
    /* Per-image offsets matching the React component */
    .zp-layer:nth-child(2) .zp-inner { top: -30vh; left: 5vw;    width: 35vw; height: 30vh; }
    .zp-layer:nth-child(3) .zp-inner { top: -10vh; left: -25vw;  width: 20vw; height: 45vh; }
    .zp-layer:nth-child(4) .zp-inner {             left: 27.5vw;  width: 25vw; height: 25vh; }
    .zp-layer:nth-child(5) .zp-inner { top: 27.5vh; left: 5vw;   width: 20vw; height: 25vh; }
    .zp-layer:nth-child(6) .zp-inner { top: 27.5vh; left: -22.5vw; width: 30vw; height: 25vh; }
    .zp-layer:nth-child(7) .zp-inner { top: 22.5vh; left: 25vw;  width: 15vw; height: 15vh; }

    /* Scroll hint */
    .zp-hint {
      position: absolute;
      bottom: 2rem;
      left: 50%;
      transform: translateX(-50%);
      font-size: 0.65rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: rgba(245,242,236,0.3);
      z-index: 10;
      pointer-events: none;
      animation: hintBob 2s ease-in-out infinite;
    }
    @keyframes hintBob {
      0%, 100% { transform: translateX(-50%) translateY(0); }
      50%       { transform: translateX(-50%) translateY(6px); }
    }
  </style>

  <footer class="ph-footer">
    <span class="ph-footer-logo">Lavey Lai</span>
    <span class="ph-footer-copy">© 2025 Lavey Lai. All rights reserved.</span>
  </footer>

  <!-- LIGHTBOX -->
  <div id="lightbox" class="lb" role="dialog" aria-modal="true">
    <button class="lb-btn lb-close" id="lb-close" aria-label="Close">×</button>
    <button class="lb-btn lb-prev"  id="lb-prev"  aria-label="Previous">‹</button>
    <button class="lb-btn lb-next"  id="lb-next"  aria-label="Next">›</button>
    <img id="lb-img" src="" alt="" />
    <span class="lb-counter" id="lb-counter"></span>
  </div>

  <script>
    /* ── Zoom Parallax ── */
    (function() {
      const container = document.getElementById('zp-container');
      const layers    = container.querySelectorAll('.zp-layer');
      const scaleEnds = [4, 5, 6, 5, 6, 8, 9];

      function update() {
        const rect        = container.getBoundingClientRect();
        const totalScroll = container.offsetHeight - window.innerHeight;
        const progress    = Math.max(0, Math.min(1, -rect.top / totalScroll));

        layers.forEach((layer, i) => {
          const end   = scaleEnds[i % scaleEnds.length];
          const scale = 1 + (end - 1) * progress;
          layer.style.transform = `scale(${scale})`;
        });
      }

      window.addEventListener('scroll', update, { passive: true });
      update();
    })();

    /* Stagger animation delays */
    document.querySelectorAll('.pw-item').forEach((el, i) => {
      el.style.animationDelay = `${i * 28}ms`;
    });

    /* Lightbox */
    const items   = Array.from(document.querySelectorAll('.pw-item'));
    const lb      = document.getElementById('lightbox');
    const lbImg   = document.getElementById('lb-img');
    const lbCount = document.getElementById('lb-counter');
    const srcs    = items.map(el => el.querySelector('img').src);
    let cur = 0;

    function open(i) {
      cur = i;
      lbImg.src = srcs[cur];
      lbCount.textContent = `${cur + 1} / ${srcs.length}`;
      lb.classList.add('active');
      document.body.style.overflow = 'hidden';
    }
    function close() {
      lb.classList.remove('active');
      document.body.style.overflow = '';
    }
    function move(d) {
      cur = (cur + d + srcs.length) % srcs.length;
      lbImg.src = srcs[cur];
      lbCount.textContent = `${cur + 1} / ${srcs.length}`;
    }

    items.forEach((el, i) => el.addEventListener('click', () => open(i)));
    document.getElementById('lb-close').addEventListener('click', close);
    document.getElementById('lb-prev').addEventListener('click', () => move(-1));
    document.getElementById('lb-next').addEventListener('click', () => move(1));
    lb.addEventListener('click', e => { if (e.target === lb) close(); });

    document.addEventListener('keydown', e => {
      if (!lb.classList.contains('active')) return;
      if (e.key === 'Escape')     close();
      if (e.key === 'ArrowLeft')  move(-1);
      if (e.key === 'ArrowRight') move(1);
    });

    let tx = 0;
    lb.addEventListener('touchstart', e => { tx = e.changedTouches[0].clientX; }, { passive: true });
    lb.addEventListener('touchend',   e => {
      const d = e.changedTouches[0].clientX - tx;
      if (Math.abs(d) > 50) move(d < 0 ? 1 : -1);
    }, { passive: true });
  </script>

</body>
